name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Node dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run build

      - name: Rename release files
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_name }}" -ne "") { "${{ github.ref_name }}" } else { "${{ inputs.tag }}" }
          $ver = $tag.TrimStart('v')
          $installer = (Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe").FullName
          $portable  = "src-tauri/target/release/ha-camera-viewer.exe"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $installer "dist/HA Camera Viewer_${ver}_x64-setup.exe"
          Copy-Item $portable  "dist/HA Camera Viewer_${ver}_portable.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: '${{ github.ref_name || inputs.tag }}'
          files: dist/*.exe
