<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111318;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  #titlebar {
    height: 32px;
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
    cursor: default;
  }
  #titlebar .title {
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
  }
  #closeBtn {
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 16px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  #closeBtn:hover { background: #7f1d1d; color: #fca5a5; }

  #cameraWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #cameraImg {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #errorMsg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: #64748b;
    font-size: 13px;
  }
  #errorMsg .icon { font-size: 32px; }

  #timerBar {
    height: 4px;
    background: #1e2330;
    flex-shrink: 0;
    display: none;
  }
  #timerFill {
    height: 100%;
    background: #2563eb;
    width: 100%;
    transition: width linear;
  }

  #controls {
    background: #0d1117;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #timerLabel {
    font-size: 11px;
    color: #64748b;
    min-width: 80px;
  }
  .btn {
    background: #1e2330;
    border: 1px solid #2d3348;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #2d3348; }

  #cameraPicker {
    display: none;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 5px;
    padding: 6px 10px;
    background: #080b10;
    border-top: 1px solid #1e2330;
    flex-shrink: 0;
  }
  .cam-switch-btn {
    background: #1e2330;
    border: 1px solid #2d3348;
    color: #94a3b8;
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .cam-switch-btn:hover { background: #2d3348; color: #e2e8f0; }
  .cam-switch-btn.active { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; cursor: default; }
</style>
</head>
<body>

<div id="titlebar" data-tauri-drag-region>
  <span class="title" id="cameraLabel" data-tauri-drag-region>HA Camera</span>
  <button id="closeBtn" title="Close">&#x2715;</button>
</div>

<div id="cameraWrap">
  <img id="cameraImg" alt=""/>
  <div id="errorMsg">
    <span class="icon">&#x1F4F7;</span>
    <span id="errorText">Connecting to camera&hellip;</span>
  </div>
</div>

<div id="timerBar"><div id="timerFill"></div></div>

<div id="controls">
  <span id="timerLabel">&ndash;</span>
  <div style="display:flex;gap:6px">
    <button class="btn" id="extendBtn">+30s</button>
    <button class="btn" id="noTimerBtn">Keep open</button>
  </div>
</div>

<div id="cameraPicker"></div>

<script>
  let timerInterval = null;
  let remaining = 0;
  let originalTimeout = 0;
  let currentActiveIdx = -1;

  const img = document.getElementById('cameraImg');
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');
  const timerLabel = document.getElementById('timerLabel');
  const timerBar = document.getElementById('timerBar');
  const timerFill = document.getElementById('timerFill');
  const cameraLabel = document.getElementById('cameraLabel');
  const cameraPicker = document.getElementById('cameraPicker');

  function startCountdown(seconds) {
    clearInterval(timerInterval);
    remaining = seconds;

    if (seconds <= 0) {
      timerLabel.textContent = 'Staying open';
      timerBar.style.display = 'none';
      return;
    }

    timerBar.style.display = 'block';
    timerFill.style.transition = 'none';
    timerFill.style.width = '100%';
    timerFill.getBoundingClientRect();
    timerFill.style.transition = `width ${seconds}s linear`;
    timerFill.style.width = '0%';

    timerInterval = setInterval(() => {
      remaining--;
      timerLabel.textContent = remaining > 0 ? `Closing in ${remaining}s` : 'Closing…';
      if (remaining <= 0) clearInterval(timerInterval);
    }, 1000);

    timerLabel.textContent = `Closing in ${remaining}s`;
  }

  function loadCamera(url, entityId) {
    cameraLabel.textContent = (entityId || '').replace('camera.', '').replace(/_/g, ' ');
    errorMsg.style.display = 'none';
    img.style.display = 'block';
    img.src = '';
    img.onerror = () => { img.style.display = 'none'; errorMsg.style.display = 'flex'; errorText.textContent = 'Camera unavailable'; };
    img.onload = () => { errorMsg.style.display = 'none'; img.style.display = 'block'; };
    img.src = url + '?t=' + Date.now();
  }

  function renderCameraPicker(cameras, activeIdx) {
    if (!cameras || cameras.length <= 1) {
      cameraPicker.style.display = 'none';
      return;
    }
    cameraPicker.style.display = 'flex';
    cameraPicker.innerHTML = '';
    cameras.forEach(cam => {
      const btn = document.createElement('button');
      btn.className = 'cam-switch-btn' + (cam.idx === activeIdx ? ' active' : '');
      btn.textContent = cam.name;
      btn.addEventListener('click', () => {
        if (cam.idx !== currentActiveIdx) {
          invoke('switch_camera', { idx: cam.idx, timeout: originalTimeout });
        }
      });
      cameraPicker.appendChild(btn);
    });
  }

  if (!window.__TAURI__) {
    document.getElementById('errorText').textContent = 'Tauri API not available';
    document.getElementById('errorMsg').style.display = 'flex';
    throw new Error('window.__TAURI__ is undefined');
  }
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;

  listen('show-camera', ({ payload }) => {
    const { cameraUrl, cameraEntityId, timeout, showBar, cameras, activeCameraIdx } = payload;
    loadCamera(cameraUrl, cameraEntityId);
    timerBar.style.display = showBar ? 'block' : 'none';
    startCountdown(timeout);
    originalTimeout = timeout;
    currentActiveIdx = activeCameraIdx ?? 0;
    renderCameraPicker(cameras, activeCameraIdx);
  });

  listen('timer-extended', ({ payload: seconds }) => {
    startCountdown(seconds);
  });

  listen('do-hide', () => {
    img.src = '';
    invoke('close_popup');
  });

  document.getElementById('closeBtn').addEventListener('click', () => invoke('close_popup'));

  document.getElementById('extendBtn').addEventListener('click', () => {
    const newTime = remaining + 30;
    invoke('extend_timer', { seconds: newTime });
    startCountdown(newTime);
  });

  document.getElementById('noTimerBtn').addEventListener('click', () => {
    clearInterval(timerInterval);
    invoke('extend_timer', { seconds: 0 });
    timerLabel.textContent = 'Staying open';
    timerBar.style.display = 'none';
  });
</script>
</body>
</html>
